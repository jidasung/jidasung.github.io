title: Jake's Tech Blog
description: > # this means to ignore newlines until "baseurl:"
  A tech blog by Hyeong Gyu Jeong — notes on AI projects, the Georgia Tech
  OMSCS journey, software engineering, and the occasional dive log.
permalink: ':title/'
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://jidasung.github.io" # the base hostname & protocol for your site
site-twitter: #if your site has a twitter account, enter it here

# Author Settings
author: Hyeong Gyu Jeong # add your name
author-img: jake-jeong.jpg # add your photo
about-author: Software & AI engineer writing about what I build and learn — AI projects, OMSCS coursework, and engineering notes. Studying at Georgia Tech OMSCS, diving on the weekends.
social-twitter: jidasung
social-facebook: jidasung
social-github: jidasung
social-linkedin: jidasung
social-email: hunguenglish@gmail.com

# Main interests / blog categories. Used to organize posts and drive the
# navigation menu below.
categories:
  - AI Projects
  - OMSCS
  - Scuba Diving

# Navigation menu (title + tag slug to link into /tags).
menu:
  - title: AI Projects
    slug: ai-projects
  - title: OMSCS
    slug: omscs
  - title: Scuba Diving
    slug: scuba-diving

# Disqus
discus-identifier: mr-brown # add your discus identifier

# Tracker
analytics: # Google Analytics

# Build Settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jekyll-feed
  - jemoji

paginate: 8
paginate_path: "/page/:num"

# Default front matter so new posts only need their own metadata.
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock", "new_post.py", "README.md"]
